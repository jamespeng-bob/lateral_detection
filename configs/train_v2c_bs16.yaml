# v2c re-run on bobyard-server-6000 — single-GPU, bs=16.
#
# Old v2c on the 5090 was bs=4 single-GPU (OOM at bs=8 because MiT-B2's
# attention is O(N^2) memory at 1024^2). On the 6000 we can fit bs=16 in
# ~25-30 GB. MiT-B2 uses LayerNorm only, so DDP vs single-GPU is moot for
# this encoder's BN handling — we still pick single-GPU for parallel-job
# scheduling reasons (run two variants in parallel on the two GPUs).
#
# Launch:
#   python train.py --overlay configs/train_v2c_bs16.yaml --device cuda:0

model:
  encoder: mit_b2

training:
  batch_size: 16
  save_dir:  runs/v2c_mitb2_bcedice_bs16
