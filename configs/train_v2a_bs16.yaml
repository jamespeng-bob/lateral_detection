# v2a re-run on bobyard-server-6000 — single-GPU, bs=16.
#
# The 5090 forced bs=4 + DDP for EfficientNet-B3 (32 GB OOM'd at bs=8). The
# 6000 has 51 GB per card so bs=16 single-GPU fits with ~25 GB peak (well
# inside the budget). Going single-GPU sidesteps the SyncBN/EfficientNet
# interaction that broke the 5090 DDP run entirely — no SyncBN to disable,
# no DDP sampler logic, no cross-rank gradient averaging.
#
# LR is intentionally LEFT at the base 1.0e-4 (same as old v2b at bs=8) so
# the comparison isolates "encoder + larger batch" from "different lr". If
# we want to also bump lr for the bigger batch, that's a separate ablation
# in v3, not in this re-run.
#
# Launch:
#   python train.py --overlay configs/train_v2a_bs16.yaml --device cuda:0

model:
  encoder: tu-efficientnet_b3

training:
  batch_size: 16
  save_dir:  runs/v2a_effb3_bcedice_bs16
