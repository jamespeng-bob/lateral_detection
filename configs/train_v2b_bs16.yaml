# v2b re-run on bobyard-server-6000 — single-GPU, bs=16.
#
# Old v2b was already single-GPU bs=8 on the 5090. Doubling to bs=16 here
# tests whether the encoder + this loss + dataset benefit from larger
# effective batch (less gradient noise) or whether bs=8 was already near
# the sweet spot. lr unchanged (1.0e-4) so the only axis of variation is
# batch size.
#
# Launch:
#   python train.py --overlay configs/train_v2b_bs16.yaml --device cuda:1

model:
  encoder: tu-hgnetv2_b4

training:
  batch_size: 16
  save_dir:  runs/v2b_hgnetv2b4_bcedice_bs16
