# v2c — MiT-B2 encoder (SegFormer's hierarchical transformer), otherwise identical to v1.
#
# Encoder family: hierarchical transformer (27.5 M params).
# Hypothesis:     tests whether attention helps on our task at all. MiT/SegFormer
#                 was designed for dense prediction (not classification), so it
#                 avoids the vanilla-ViT failure mode of destroying thin lines
#                 with a 16x patch stem — its 4x stem keeps fine spatial detail.
#
# Usage:
#   python train.py --overlay configs/train_v2c.yaml --device cuda:0

model:
  encoder: mit_b2

training:
  # MiT-B2 OOMs at bs=8: the attention matmul (q @ k.T) at 1024^2 input is
  # genuinely O(N^2) memory and blows the 32 GB budget. bs=4 fits with
  # comfortable headroom (~12-14 GB). Same impurity caveat as v2a.
  batch_size: 4
  save_dir: runs/v2c_mitb2_bcedice
