# v2a — EfficientNet-B3 encoder, otherwise identical to v1.
#
# Encoder family: efficient CNN (12.6 M params).
# Hypothesis:     a well-tuned, parameter-efficient CNN should give a clean
#                 +1 to +3 Dice over ResNet-34 (21 M) with low overfitting risk.
#
# Usage:
#   python train.py --overlay configs/train_v2a.yaml --device cuda:0

model:
  encoder: tu-efficientnet_b3

training:
  # PER-GPU batch size. EfficientNet-B3 OOMs at bs=8 on a single 32 GB GPU
  # (depthwise + SE blocks save many intermediate activations at 1024^2).
  # Under DDP with world_size=2, effective bs = 4 * 2 = 8, matching v2b
  # for an apples-to-apples encoder comparison. Launch with:
  #   torchrun --nproc-per-node=2 --master-port=29500 train.py \
  #       --overlay configs/train_v2a.yaml
  batch_size: 4

  # Disable SyncBN for EfficientNet (see comment in configs/train.yaml).
  # An earlier DDP+SyncBN run of this exact config tanked to dice=0.6059
  # vs the single-GPU baseline of 0.8196 — leaving BN per-rank at bs=4
  # matches the single-GPU run's BN setup exactly.
  sync_batch_norm: false

  # The previous DDP+SyncBN run (broken, dice=0.6059) lives at
  # runs/v2a_effb3_bcedice_ddp_syncbn_broken — keeping the no-SyncBN DDP
  # rerun in its own directory so we don't conflate the two.
  save_dir: runs/v2a_effb3_bcedice_ddp_nosyncbn
