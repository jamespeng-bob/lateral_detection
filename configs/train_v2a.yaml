# v2a — EfficientNet-B3 encoder, otherwise identical to v1.
#
# Encoder family: efficient CNN (12.6 M params).
# Hypothesis:     a well-tuned, parameter-efficient CNN should give a clean
#                 +1 to +3 Dice over ResNet-34 (21 M) with low overfitting risk.
#
# Usage:
#   python train.py --overlay configs/train_v2a.yaml --device cuda:0

model:
  encoder: tu-efficientnet_b3

training:
  # EfficientNet-B3 OOMs at bs=8 on a 32 GB GPU — depthwise convs + SE blocks
  # save more intermediate activations per layer than ResNet, and at 1024^2
  # that adds up fast. bs=4 matches v1's batch and fits comfortably (~8-9 GB).
  # Adds slight comparison impurity vs v2b (which fits at bs=8), but the
  # encoder effect should dominate the batch-size effect.
  batch_size: 4
  save_dir: runs/v2a_effb3_bcedice
