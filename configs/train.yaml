# Training-specific config. Merged on top of configs/base.yaml at runtime
# (train.py performs a shallow dict merge — keys here override base.yaml).

model:
  name: smp_unet                  # smp_unet | deep_unet
  encoder: resnet34               # smp encoder name
  encoder_weights: imagenet       # imagenet | null

data:
  tile_size: 1024
  stride:    768                  # used by grid / pos_only_grid modes
  train_mode: random              # random | grid | pos_only_grid
  val_mode:   pos_only_grid       # grid | pos_only_grid
  samples_per_epoch_per_image: 8  # for `random` mode

augmentation:
  enabled: true
  hflip_prob:     0.5
  vflip_prob:     0.5
  rotate_90_prob: 0.5             # k * 90 degrees, k in {1, 2, 3}

normalization:
  # Dataset-specific stats computed over 50 random training plans
  # (~4.1 B pixels) on 2026-06-02. Reproduce with:
  #   python -m scripts.compute_dataset_stats --split train --n-images 50
  #
  # Blueprint pages are essentially grayscale (R=G=B) and have notably
  # higher contrast variance than natural images, so dataset std (~0.40)
  # is much larger than ImageNet std (~0.23). Using ImageNet stats here
  # would stretch our post-norm input std to ~1.74 instead of ~1.0,
  # which the pretrained encoder's first layers then have to absorb.
  #
  # IMPORTANT: v1 and v2 checkpoints were trained with ImageNet stats
  # (the values commented below). When running inference with those
  # checkpoints, use the matching config — do not swap stats post-hoc.
  mean: [0.2041, 0.2041, 0.2041]
  std:  [0.4031, 0.4031, 0.4031]

  # Old ImageNet defaults (used by v1, v2a, v2b, v2c — keep their configs
  # if you ever rerun inference with their best.pth files):
  #   mean: [0.485, 0.456, 0.406]
  #   std:  [0.229, 0.224, 0.225]

loss:
  name: bce_dice                  # bce_dice | focal_dice
  bce_pos_weight: 1.0             # 1.0 = no extra positive weighting; Dice carries imbalance
  dice_weight:    1.0
  focal_alpha:    0.25            # used only when name == focal_dice
  focal_gamma:    2.0

training:
  # bs=16 fits a ResNet-34 unet at 1024² (~7 GB) but spills to >30 GB for
  # EfficientNet/MiT encoders because activations dominate at this resolution
  # and those encoders save more intermediate tensors than ResNet does.
  # bs=8 fits all three v2 variants on a 32 GB GPU with comfortable headroom.
  batch_size:  8
  num_workers: 4
  epochs:      80
  lr:          1.0e-4
  weight_decay: 1.0e-4
  grad_clip:   1.0
  device:      cuda               # cuda | cuda:0 | cpu | mps
  save_dir:    runs/v1_resnet34_bcedice
  log_interval: 20
  val_viz_count: 4
  best_metric: dice               # dice | loss
